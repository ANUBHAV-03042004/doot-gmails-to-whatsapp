<svg width="100%" viewBox="0 0 680 570" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Schedule trigger -->
<g class="c-gray">
  <rect x="250" y="28" width="180" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#444441">Schedule trigger</text>
  <text class="ts" x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#5F5E5A">Every 1 minute</text>
</g>

<!-- Arrow: trigger → storage get -->
<line x1="340" y1="72" x2="340" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Storage Get -->
<g>
  <rect x="250" y="108" width="180" height="44" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text x="340" y="124" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#2C2C2A">Storage</text>
  <text x="340" y="142" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#5F5E5A">Get sent_ids</text>
</g>

<!-- Fan-out arrows: storage get → 4 gmail boxes -->
<line x1="340" y1="152" x2="100" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="340" y1="152" x2="253" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="340" y1="152" x2="407" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="340" y1="152" x2="560" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Gmail boxes (teal) -->
<g>
  <rect x="40" y="198" width="120" height="44" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="100" y="214" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#085041">Gmail 1</text>
  <text x="100" y="232" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#0F6E56">Find email</text>
</g>
<g>
  <rect x="193" y="198" width="120" height="44" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="253" y="214" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#085041">Gmail 2</text>
  <text x="253" y="232" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#0F6E56">Find email</text>
</g>
<g>
  <rect x="347" y="198" width="120" height="44" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="407" y="214" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#085041">Gmail 3</text>
  <text x="407" y="232" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#0F6E56">Find email</text>
</g>
<g>
  <rect x="500" y="198" width="120" height="44" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="560" y="214" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#085041">Gmail 4 *</text>
  <text x="560" y="232" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#0F6E56">Find email</text>
</g>

<!-- Fan-in arrows: 4 gmail boxes → Code step -->
<line x1="100" y1="242" x2="245" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="253" y1="242" x2="295" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="407" y1="242" x2="380" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="560" y1="242" x2="430" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Code step (purple) -->
<g>
  <rect x="180" y="288" width="320" height="58" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="340" y="308" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#26215C">Code (JavaScript)</text>
  <text x="340" y="328" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#534AB7">Merge · dedup · OTP detect · send</text>
</g>

<!-- Branch paths from Code to Green API and Storage Put -->
<path d="M340,346 L340,372 L160,372 L160,398" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<path d="M340,346 L340,372 L520,372 L520,398" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- Green API box (green) -->
<g>
  <rect x="80" y="398" width="160" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
  <text x="160" y="414" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#173404">Green API</text>
  <text x="160" y="432" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#3B6D11">WhatsApp delivery</text>
</g>

<!-- Storage Put (gray) -->
<g>
  <rect x="440" y="398" width="160" height="44" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text x="520" y="414" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#2C2C2A">Storage</text>
  <text x="520" y="432" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#5F5E5A">Put sent_ids</text>
</g>

<!-- Arrow: Green API → WhatsApp -->
<line x1="160" y1="442" x2="160" y2="478" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- WhatsApp message (amber toned green) -->
<g>
  <rect x="80" y="478" width="160" height="52" rx="8" stroke-width="0.5" fill="#25D36618" stroke="#25D366"/>
  <text x="160" y="496" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" font-family="system-ui,sans-serif" fill="#27500A">WhatsApp</text>
  <text x="160" y="514" text-anchor="middle" dominant-baseline="central" font-size="12" font-family="system-ui,sans-serif" fill="#3B6D11">Message delivered</text>
</g>

<!-- Footnote -->
<text x="340" y="552" text-anchor="middle" font-size="12" font-family="system-ui,sans-serif" fill="#888780">* Gmail 4 receives forwarded mail from an org account blocked from direct OAuth</text>
</svg>
